<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Library</title>

  <link rel="stylesheet" href="../style.css">
</head>

<body>

    <div class="container">

    <button class="back-btn" onclick="history.back()">
        Back
    </button>

    <h1>Valve</h1>

    <div class = "controls">
        <input type = "text"
            placeholder="Search Valve"
            class = "search-box"
        >
        <select class="filter-dropdown">
            <option value="all">ID</option>
            <option value="all">A-Z</option>
            <option value="all">Copies Sold</option>
            <option value="all">Genre</option>
            <option value="all">Developer</option>
            <option value="all">Release Date</option>
            <option value="all">Price</option>
            <option value="all">Estimated Playtime</option>
        </select>
    </div>

    <div class="content-list">

        <div class="item">
        
        <div class="item-header">
            <div class = item-title>Fortnite</div>

            <div class = item-id>1</div>
        </div>

        <div class = "item-details">
            <div class = "info-box">
                <span class = label>Copies Sold</span>
                <span class = label-content>100000</span>
            </div>
            <div class = "info-box">
                <span class = label>Genre</span>
                <span class = label-content>Multiplayer</span>
            </div>
            <div class = "info-box">
                <span class = label>Developer</span>
                <span  class = label-content>Epic Games</span>
            </div>
            <div class = "info-box">
                <span class = label>Release Date</span>
                <span  class = label-content>7-25-2017</span>
            </div>
            <div class = "info-box">
                <span class = label>Price</span>
                <span  class = label-content>$0.00</span>
            </div>
            <div class = "info-box">
                <span class = label>Estimated Playtime</span>
                <span  class = label-content>Unknown</span>
            </div>
            
        </div>
      </div>


    </div>

  </div>

</body>
</html>
