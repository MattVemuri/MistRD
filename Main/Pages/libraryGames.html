<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Library Games</title>

  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,arrow_back,delete,edit,home"/>
</head>

<body>

    <div class="container">

    <a class="navi-btn" href="../homepage.html">
        <span class="material-symbols-outlined">home</span>
    </a>

    <button class="navi-btn" onclick="history.back()">
        <span class="material-symbols-outlined">arrow_back</span>
    </button>

    

    <h1>Counter-Strike 2</h1>
    <h3>This page lets users interact with the Library_Games table</h3>

    <div class = "controls">
        <input type = "text"
            placeholder="Search library"
            class = "search-box"
        >
        <select class="filter-dropdown">
            <option value="all">ID</option>
            <option value="all">A-Z</option>
            <option value="all">Playtime</option>
            <option value="all">Completion</option>
        </select>
        <!-- <span class="material-symbols-outlined add">add</span> -->
    </div>
    
    <div class="content-list">

        <a class="item item-interact" href="./library.html">
            
            <div class="item-header">
                <div class = item-title>Matt</div>
                <div class = "item-actions">
                    <div class="item-id">1</div>
                    <span class="material-symbols-outlined edit" id="delete">delete</span>
                <span class="material-symbols-outlined edit" id="edit">edit</span>
                </div>
            </div>

            <div class = "item-details">
                <div class = "info-box">
                    <span class = label>Playtime</span>
                    <span class = label-content>80</span>
                </div>                
                <div class = "info-box">
                    <span class = label>Completion</span>
                    <span class = label-content>100%</span>
                </div>                
            </div>
        </a>

        <a class="item item-interact" href="./library.html">
            
            <div class="item-header">
                <div class = item-title>xXX_Gamer_XXx</div>
                <div class = "item-actions">
                    <div class="item-id">3</div>
                    <span class="material-symbols-outlined edit" id="delete">delete</span>
                <span class="material-symbols-outlined edit" id="edit">edit</span>
                </div>
            </div>

            <div class = "item-details">
                <div class = "info-box">
                    <span class = label>Playtime</span>
                    <span class = label-content>680</span>
                </div>                
                <div class = "info-box">
                    <span class = label>Completion</span>
                    <span class = label-content>100%</span>
                </div>                
            </div>
        </a>
    </div>

    </div>

  </div>
  <script src="../mistrd.js"></script>
</body>
</html>
