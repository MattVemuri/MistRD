<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Users</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=add,arrow_back,delete,edit,home"/>
</head>
<body>

  <div class="container">

    
    <a class="navi-btn" href="../homepage.html">
        <span class="material-symbols-outlined">home</span>
    </a>

    <button class="navi-btn" onclick="history.back()">
        <span class="material-symbols-outlined">arrow_back</span>
    </button>


    <h1>Users</h1>

    <div class = "controls">
        <input type = "text"
        placeholder="Search users"
        class = "search-box">
        <select class="filter-dropdown">
            <option value="all">ID</option>
            <option value="all">A-Z</option>
            <option value="all">Playtime</option>
            <option value="all">Owned Games</option>
        </select>
        <span class="material-symbols-outlined add">add</span>
    </div>
    
    <div class="content-list">


    <div class= "form hidden"> 
        <div class="item-header">
            <div class = item-title>Add User</div>
        </div>
        <form action = "./users.html"> 
            <label>Username:</label><br>
                <input type = "text" name = "user" class = "add-box"><br>
            <br>
            <input type = "submit" value = "Submit" class="filter-dropdown">
        </form>
    </div>


    <a class="item item-interact" href="./library.html">
        <div class="item-header">
            <span class = item-title>Matt</span>

            
            <div class = "item-actions">
                <span class = item-id>1</span>
                <span class="material-symbols-outlined edit" id="delete">delete</span>
                <span class="material-symbols-outlined edit" id="edit">edit</span>
            </div>
        </div>
        
        <div class = "item-details">
            <div class = "info-box">
                <span class = label>Total Playtime</span>
                <span class = label-content>88</span>
            </div>
            <div class = "info-box">
                <span class = label>Owned Games</span>
                <span class = label-content>2</span>
            </div>
        </div>
    </a>

    <a class="item item-interact" href="./library.html">
        <div class="item-header">
            <span class = item-title>Sophia</span>

            <div class = "item-actions">
                <span class = item-id>2</span>
                <span class="material-symbols-outlined edit">delete</span>
                <span class="material-symbols-outlined edit">edit</span>
            </div>
        </div>
        
        <div class = "item-details">
            <div class = "info-box">
                <span class = label>Total Playtime</span>
                <span class = label-content>111</span>
            </div>
            <div class = "info-box">
                <span class = label>Owned Games</span>
                <span class = label-content>3</span>
            </div>
        </div>
    </a>

    <a class="item item-interact" href="./library.html">
        
        <div class="item-header">
            <span class = item-title>xXX_Gamer_XXx</span>
            <div class = "item-actions">
                <span class = item-id>3</span>
                <span class="material-symbols-outlined edit">delete</span>
                <span class="material-symbols-outlined edit">edit</span>
            </div>
        </div>
        
        <div class = "item-details">
            <div class = "info-box">
                <span class = label>Total Playtime</span>
                <span class = label-content>769</span>
            </div>
            <div class = "info-box">
                <span class = label>Owned Games</span>
                <span class = label-content>4</span>
            </div>
        </div>
    </a>

    </div>

  </div>
  <script src="../mistrd.js"></script>
</body>
</html>

<!-- username, id, owned games, totalPlaytime -->
